<!DOCTYPE html> <meta charset=utf-8 > <title>Infinite Polygon for different values of a</title> <style> body,h1, h2, h3, h4, h5, h6 { font-family: Helvetica, sans-serif; text-align: center; } svg { fill.setAttribute("fill","red"); border: 1px solid #aaa; background: #fafafa; } .slider { margin: 30px; } </style> <h2>Infinite Polygon for different values of <math display=inline  class=tml-display  style="display:block math;"> <mrow> <mi>a</mi> </mrow> </math></h2> <div class=slider > <label> a = <span id=aval >-0.50</span> <input id=aSlider  type=range  min=-1  max=-0.5  step=0.001  value=-0.50 > </label> </div> <svg id=figure  width=700  height=500  viewBox="-3 -2.2 6 4.4" stroke-linejoin=round > <g id=polygon  stroke-linejoin=round ></g> <line x1="-3" y1="0" x2="3" y2="0" stroke="#000000" opacity=0.5  stroke-width=0.02px /> <line x1="0" y1="-2.1" x2="0" y2="2.1" stroke="#000000" opacity=0.4  stroke-width=0.02px /> </svg> <script type=module > const svgGroup = document.getElementById("polygon"); const slider = document.getElementById("aSlider"); const aval = document.getElementById("aval"); function point(x,y){ return `${x},${y}`; } function draw(){ let a=parseFloat(slider.value); aval.innerHTML=a.toFixed(2); svgGroup.innerHTML=""; let theta=-Math.PI/(2*a); let z1=[ Math.cos(theta), Math.sin(theta) ]; let z2=[ Math.cos(theta), -Math.sin(theta) ]; // infinite rays let L=40; if (a = -0.5) { // Fill the right half-plane let fill = document.createElementNS( "http://www.w3.org/2000/svg", "polygon" ); fill.setAttribute( "points", [ point(z1[0] + L*Math.cos(theta-Math.PI/2),-L), point(L,-L), point(L,L), point(z2[0] + L*Math.cos(-theta+Math.PI/2),L) ].join(" ") ); fill.setAttribute( "fill", "#cab2d6" ); svgGroup.appendChild(fill); } else { // Original wedge fill let fill = document.createElementNS( "http://www.w3.org/2000/svg", "polygon" ); let p1 = [ z1[0] + L*Math.cos(theta-Math.PI/2), z1[1] + L*Math.sin(theta-Math.PI/2) ]; let p2 = [ z2[0] + L*Math.cos(-theta+Math.PI/2), z2[1] + L*Math.sin(-theta+Math.PI/2) ]; fill.setAttribute( "points", [ point(0,0), point(z1[0],z1[1]), point(p1[0],p1[1]), point(p2[0],p2[1]), point(z2[0],z2[1]) ].join(" ") ); fill.setAttribute( "fill", "#cab2d6" ); svgGroup.appendChild(fill); } let elements=[]; function line(x1,y1,x2,y2,color,width){ let e=document.createElementNS( "http://www.w3.org/2000/svg", "line" ); e.setAttribute("x1",x1); e.setAttribute("y1",y1); e.setAttribute("x2",x2); e.setAttribute("y2",y2); e.setAttribute("stroke",color); e.setAttribute("stroke-width",width); svgGroup.appendChild(e); } // sides from origin line( 0,0, z1[0],z1[1], "#6a3d9a",0.06 ); line( 0,0, z2[0],z2[1], "#6a3d9a",0.06 ); // Filled region let fill = document.createElementNS( "http://www.w3.org/2000/svg", "polygon" ); let p1 = [ z1[0] + L*Math.cos(theta - Math.PI/2), z1[1] + L*Math.sin(theta - Math.PI/2) ]; let p2 = [ z2[0] + L*Math.cos(-theta + Math.PI/2), z2[1] + L*Math.sin(-theta + Math.PI/2) ]; fill.setAttribute( "points", [ point(0,0), point(z1[0],z1[1]), point(p1[0],p1[1]), point(p2[0],p2[1]), point(z2[0],z2[1]) ].join(" ") ); fill.setAttribute( "fill", "#cab2d6" ); svgGroup.appendChild(fill); // continue to infinity line( z1[0], z1[1], z1[0]+L*Math.cos(theta - Math.PI/2), z1[1]+L*Math.sin(theta - Math.PI/2), "#6a3d9a",0.03 ); line( z2[0], z2[1], z2[0]+L*Math.cos(-theta + Math.PI/2), z2[1]+L*Math.sin(-theta + Math.PI/2), "#6a3d9a",0.03 ); function vertex(x,y,color,label){ let c=document.createElementNS( "http://www.w3.org/2000/svg", "circle" ); c.setAttribute("cx",x); c.setAttribute("cy",y); c.setAttribute("r",0.07); c.setAttribute("fill",color); svgGroup.appendChild(c); let t=document.createElementNS( "http://www.w3.org/2000/svg", "text" ); t.setAttribute("x",x+0.1); t.setAttribute("y",y-0.1); t.textContent=label; svgGroup.appendChild(t); } vertex(0,0,"red"); vertex( z1[0], z1[1], "green", /*"z₊"*/ ); vertex( z2[0], z2[1], "green", /*"z₋"*/ ); let text=document.createElementNS( "http://www.w3.org/2000/svg", "text" ); text.setAttribute("x",-2.8); text.setAttribute("y",-1.8); text.textContent= "origin angle = " +(-Math.PI/a).toFixed(3) +" rad"; svgGroup.appendChild(text); } slider.addEventListener( "input", draw ); draw(); </script> <p > The function <math display=inline  class=tml-display  style="display:block math;"> <mrow> <mi>ϕ</mi> <mrow> <mo fence=true  form=prefix  stretchy=false >(</mo> <mi>a</mi> <mo separator=true >;</mo> <mi>z</mi> <mo fence=true  form=postfix  stretchy=false >)</mo> </mrow> </mrow> </math> maps the right-half plane conformally into the polygon in blue. By moving the slider above, you can choose any value of <math display=inline  class=tml-display  style="display:block math;"> <mrow> <mi>a</mi> </mrow> </math> in [-1,-1/2]. </p>
